<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="16" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="text1" x1="0" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Icon box -->
  <rect width="52" height="52" rx="14" fill="url(#bg)"/>

  <!-- JS letters -->
  <text x="10" y="37" font-family="'Segoe UI',system-ui,sans-serif" font-weight="800" font-size="26" fill="white" letter-spacing="-1">JS</text>

  <!-- Orange accent dot -->
  <circle cx="44" cy="10" r="7" fill="url(#dot)"/>

  <!-- Brand text: Just -->
  <text x="62" y="30" font-family="'Segoe UI',system-ui,sans-serif" font-weight="800" font-size="22" fill="url(#text1)">Just</text>

  <!-- Brand text: Simple -->
  <text x="107" y="30" font-family="'Segoe UI',system-ui,sans-serif" font-weight="300" font-size="22" fill="url(#text1)">Simple</text>

  <!-- .Online tag -->
  <text x="63" y="44" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="10" fill="#f97316" letter-spacing="0.08em">.ONLINE</text>
</svg>
